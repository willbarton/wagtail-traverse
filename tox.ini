[tox]
skipsdist=True
envlist=
    lint,
    python{3.13}-django{5.2}-wagtail{6.4,7.0,7.3}
    coverage

[testenv]
install_command=pip install -e ".[testing]" -U {opts} {packages}
commands=
    python -b -m coverage run --parallel-mode --source='wagtailtraverse' {toxinidir}/testmanage.py test {posargs}

basepython=
    python3.13: python3.13

deps=
    django5.2: Django>=5.2,<5.3
    wagtail6.4: wagtail>=6.4,<6.5  # LTS
    wagtail7.0: wagtail>=7.0,<7.1  # LTS
    wagtail7.3: wagtail>=7.3,<7.4  # Latest

[testenv:lint]
basepython=python3.13
deps=
    ruff
    bandit
commands=
    ruff format --check
    ruff check wagtailtraverse
    bandit -c "pyproject.toml" -r wagtailtraverse

[testenv:coverage]
basepython=python3.13
deps=
    coverage[toml]
    diff_cover
commands=
    coverage combine
    coverage report -m
    coverage xml
    diff-cover coverage.xml --compare-branch=origin/main --fail-under=100
