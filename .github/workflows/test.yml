name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: |
          python -m pip install --upgrade pip
          pip install tox
      - run: tox -e lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tox-env:
          - python3.13-django5.2-wagtail6.4
          - python3.13-django5.2-wagtail7.0
          - python3.13-django5.2-wagtail7.3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install tox
      - run: tox -e ${{ matrix.tox-env }}
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.tox-env }}
          include-hidden-files: true
          path: .coverage.*

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: |
          python -m pip install --upgrade pip
          pip install tox
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - run: tox -e coverage
